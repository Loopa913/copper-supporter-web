<svg xmlns="http://www.w3.org/2000/svg" width="960" height="960" viewBox="0 0 960 960" fill="none">
  <defs>
    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Grid lines -->
  <g stroke="url(#lineGlow)" stroke-width="0.6" opacity="0.35" filter="url(#softGlow)">
    <line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="0" y1="480" x2="960" y2="480"/>
    <line x1="0" y1="600" x2="960" y2="600"/>
    <line x1="0" y1="720" x2="960" y2="720"/>
    <line x1="0" y1="840" x2="960" y2="840"/>
    <line x1="120" y1="0" x2="120" y2="960"/>
    <line x1="240" y1="0" x2="240" y2="960"/>
    <line x1="360" y1="0" x2="360" y2="960"/>
    <line x1="480" y1="0" x2="480" y2="960"/>
    <line x1="600" y1="0" x2="600" y2="960"/>
    <line x1="720" y1="0" x2="720" y2="960"/>
    <line x1="840" y1="0" x2="840" y2="960"/>
    <line x1="0" y1="0" x2="960" y2="960" opacity="0.2"/>
    <line x1="960" y1="0" x2="0" y2="960" opacity="0.2"/>
  </g>
  <!-- Constellation connections -->
  <g stroke="#a78bfa" stroke-width="0.8" opacity="0.25" filter="url(#softGlow)">
    <polyline points="120,240 240,120 360,240 480,120 600,240"/>
    <polyline points="120,480 240,360 360,480 480,360 600,480 720,360"/>
    <polyline points="240,600 360,720 480,600 600,720 840,600"/>
    <line x1="120" y1="240" x2="120" y2="480"/>
    <line x1="360" y1="240" x2="360" y2="480"/>
    <line x1="600" y1="240" x2="600" y2="480"/>
    <line x1="240" y1="120" x2="240" y2="360"/>
    <line x1="480" y1="120" x2="480" y2="360"/>
    <line x1="720" y1="360" x2="840" y2="480"/>
    <line x1="120" y1="720" x2="360" y2="840"/>
    <line x1="600" y1="720" x2="840" y2="840"/>
  </g>
  <g stroke="#67e8f9" stroke-width="0.6" opacity="0.2" filter="url(#softGlow)">
    <polygon points="480,480 540,420 600,480 540,540"/>
    <line x1="480" y1="480" x2="360" y2="360"/>
    <line x1="480" y1="480" x2="600" y2="360"/>
    <line x1="480" y1="480" x2="360" y2="600"/>
    <line x1="480" y1="480" x2="600" y2="600"/>
  </g>
  <!-- Nodes -->
  <g fill="#e2e8f0" opacity="0.45">
    <circle cx="120" cy="240" r="2.5"/>
    <circle cx="240" cy="120" r="2"/>
    <circle cx="360" cy="240" r="2.5"/>
    <circle cx="480" cy="120" r="2"/>
    <circle cx="600" cy="240" r="2.5"/>
    <circle cx="120" cy="480" r="2"/>
    <circle cx="240" cy="360" r="2.5"/>
    <circle cx="360" cy="480" r="3"/>
    <circle cx="480" cy="360" r="2.5"/>
    <circle cx="600" cy="480" r="2"/>
    <circle cx="720" cy="360" r="2.5"/>
    <circle cx="480" cy="480" r="3.5" fill="#a78bfa"/>
    <circle cx="360" cy="720" r="2"/>
    <circle cx="600" cy="720" r="2.5"/>
    <circle cx="840" cy="600" r="2"/>
    <circle cx="840" cy="840" r="2.5"/>
  </g>
  <g fill="#67e8f9" opacity="0.35">
    <circle cx="540" cy="420" r="1.5"/>
    <circle cx="600" cy="480" r="1.5"/>
    <circle cx="540" cy="540" r="1.5"/>
  </g>
</svg>
